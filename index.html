<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#136f63" />
  <title>Мои финансы</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#dashboard" aria-label="Мои финансы — главная"><span>₸</span> Мои финансы</a>
      <nav class="nav" aria-label="Основная навигация">
        <button class="nav-link active" data-page="dashboard">⌂ <span>Главная</span></button>
        <button class="nav-link" data-page="transactions">↕ <span>Операции</span></button>
        <button class="nav-link" data-page="budgets">▥ <span>Бюджет</span></button>
        <button class="nav-link" data-page="goals">◎ <span>Цели</span></button>
        <button class="nav-link" data-page="statistics">◔ <span>Статистика</span></button>
        <button class="nav-link" data-page="settings">⚙ <span>Настройки</span></button>
      </nav>
      <button class="theme-button" id="theme-toggle">◐ <span>Тёмная тема</span></button>
    </aside>
    <main class="main-content">
      <header class="topbar"><div><p class="eyebrow" id="page-kicker">Обзор</p><h1 id="page-title">Добрый день!</h1></div><input class="month-picker" id="month-picker" type="month" title="Выбрать месяц" aria-label="Выбрать месяц" /></header>
      <section class="page active" id="dashboard-page"></section>
      <section class="page" id="transactions-page"></section>
      <section class="page" id="budgets-page"></section>
      <section class="page" id="goals-page"></section>
      <section class="page" id="statistics-page"></section>
      <section class="page" id="settings-page"></section>
    </main>
  </div>
  <button class="fab" id="add-transaction" aria-label="Добавить операцию">+</button>
  <dialog id="modal"><form method="dialog" id="modal-form"><button class="modal-close" value="cancel" aria-label="Закрыть">×</button><div id="modal-content"></div></form></dialog>
  <div class="toast" id="toast" role="status"></div>
  <input type="file" id="import-file" accept="application/json,.json" hidden />
  <script type="module" src="js/app.js"></script>
</body>
</html>
